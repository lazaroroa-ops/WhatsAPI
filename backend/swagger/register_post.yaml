Register a new user
---
tags:
  - Auth
parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: Password123
responses:
  201:
    description: User registered successfully
  400:
    description: Invalid input or user already exists
